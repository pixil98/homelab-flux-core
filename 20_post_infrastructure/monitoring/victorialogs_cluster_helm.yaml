apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-cluster
  namespace: monitoring
spec:
  chart:
    spec:
      chart: victoria-logs-cluster
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: monitoring
      version: "0.1.2"
      interval: 6h
  interval: 30m
  install:
    remediation:
      retries: 3
  values:
    vlselect: {}
    vlinsert: {}
    vlstorage:
      persistentVolume:
        enabled: true
        storageClassName: nfs-client-nobackup
