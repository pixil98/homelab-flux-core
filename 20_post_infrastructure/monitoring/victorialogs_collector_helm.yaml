apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
  namespace: monitoring
spec:
  chart:
    spec:
      chart: victoria-logs-collector
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: monitoring
      version: "0.3.2"
      interval: 6h
  interval: 30m
  install:
    remediation:
      retries: 3
  values:
    remoteWrite:
      - url: http://victoria-logs-cluster-vlinsert.monitoring.svc.cluster.local:9481
