---
# Apps with VolSync restore: deploy depends on both restore + post-infra
# Apps without VolSync: deploy depends on post-infra only
#
# Dependency graph:
#   infra-controllers ──→ infra-configs ──→ post-infra ──────────┐
#         │                                                      │
#         ├── applications-mail-restore ──→ applications-mail ←──┤
#         ├── applications-paperless-restore ──→ applications-paperless ←──┤
#         ├── applications-games-restore ──→ applications-games ←─┤
#         ├── applications-media-restore ──→ applications-media ←─┤
#         ├── applications-mapper-restore ──→ applications-mapper ←┤
#         │                                                      │
#         │  applications-photos ←───────────────────────────────┤
#         │  applications-dns ←──────────────────────────────────┤
#         │  applications-http ←─────────────────────────────────┘

# ---------- Restore Kustomizations (per-app, depend on VolSync operator) ----------

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-core-applications-mail-restore
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-core-infrastructure-controllers
  interval: 5m
  retryInterval: 1m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-core
  path: ./30_applications/mail/restore
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-values
      - kind: Secret
        name: flux-secrets
  prune: true
  wait: true
---
