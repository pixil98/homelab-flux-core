# ---------- Deploy Kustomizations (per-app) ----------

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-core-applications-mail
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-core-post-infrastructure
    - name: flux-core-applications-mail-restore
  interval: 5m
  retryInterval: 1m
  timeout: 1h
  sourceRef:
    kind: GitRepository
    name: flux-core
  path: ./30_applications/mail/deploy
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-values
      - kind: Secret
        name: flux-secrets
  prune: true
  wait: true
  force: true
