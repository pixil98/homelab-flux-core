---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-core-platform
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-core-infrastructure-configs
  interval: 5m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-core
  path: ./20_platform
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-values
      - kind: Secret
        name: flux-secrets
  prune: true
  wait: true
