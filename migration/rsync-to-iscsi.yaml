# Migration jobs: rsync data from old nfs-subdir volumes to new iSCSI PVCs.
#
# Usage:
#   1. Replace CLUSTER_NAME with your production cluster name
#      (check: ls /mnt/main/kubernetes/ on TrueNAS)
#   2. Scale down the relevant deployment first
#   3. Delete the old PVC so Flux creates the new iSCSI one
#   4. Wait for the new PVC to be Bound
#   5. kubectl apply -f migration/rsync-to-iscsi.yaml
#   6. Watch: kubectl logs -f job/migrate-<name> -n <namespace>
#   7. Scale the deployment back up
#   8. kubectl delete -f migration/rsync-to-iscsi.yaml
#
# Old nfs-subdir paths:
#   backup:   /mnt/main/kubernetes/CLUSTER_NAME/<namespace>-<pvc>/
#   nobackup: /mnt/main/kubernetes-nobackup/CLUSTER_NAME/<namespace>-<pvc>/

# --- mail namespace ---

apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-dovecot-mailboxes
  namespace: mail
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 0
      containers:
        - name: rsync
          image: docker.io/library/alpine:3.23.4
          command:
            - sh
            - -c
            - |
              apk add --no-cache rsync
              rm -rf /dst/*
              rsync -avP --info=progress2 /src/ /dst/
          volumeMounts:
            - name: src
              mountPath: /src
              readOnly: true
            - name: dst
              mountPath: /dst
      volumes:
        - name: src
          nfs:
            server: 192.168.1.10
            path: /mnt/main/kubernetes/CLUSTER_NAME/mail-dovecot-mailboxes
        - name: dst
          persistentVolumeClaim:
            claimName: dovecot-mailboxes
