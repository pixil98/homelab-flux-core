# --- CNPG PostgreSQL clusters ---
# These were on nfs-client-ssd (base: /mnt/ssd/kubernetes/).
# CNPG names PVCs as <cluster>-<instance>, e.g. roundcube-postgresql-1.
#
# Migration steps (per cluster):
#   1. Scale CNPG Cluster to 0 instances: kubectl patch cluster <name> -n <ns> --type merge -p '{"spec":{"instances":0}}'
#   2. Wait for pods to terminate
#   3. Delete the old PVC: kubectl delete pvc <cluster>-1 -n <ns>
#   4. Scale back to 1: kubectl patch cluster <name> -n <ns> --type merge -p '{"spec":{"instances":1}}'
#   5. CNPG creates a new PVC with truenas-iscsi, then wait for it to be Bound
#   6. Scale back to 0 again (so the rsync job can mount the PVC exclusively)
#   7. Apply the rsync job below
#   8. Scale back to 1 when done

---
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-roundcube-postgresql
  namespace: mail
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 0
      containers:
        - name: rsync
          image: docker.io/library/alpine:3.23.4
          command:
            - sh
            - -c
            - |
              apk add --no-cache rsync
              rm -rf /dst/*
              rsync -avP --info=progress2 /src/ /dst/
          volumeMounts:
            - name: src
              mountPath: /src
              readOnly: true
            - name: dst
              mountPath: /dst
      volumes:
        - name: src
          nfs:
            server: 192.168.1.10
            path: /mnt/ssd/kubernetes/CLUSTER_NAME/mail-roundcube-postgresql-1
        - name: dst
          persistentVolumeClaim:
            claimName: roundcube-postgresql-1
