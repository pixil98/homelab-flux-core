apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-core-routing-cert-manager
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-core-00-foundation-configs
  interval: 5m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-core
  path: ./10_infrastructure/controllers/cert-manager
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-values
      - kind: Secret
        name: flux-secrets
  prune: true
  timeout: 10m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-core-routing-cert-manager-config
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-core-routing-cert-manager
  interval: 5m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-core
  path: ./10_infrastructure/configs/cert-manager
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-values
      - kind: Secret
        name: flux-secrets
  prune: true
  timeout: 5m
  wait: true
