apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mapmaker
  namespace: http
  labels:
    app.kubernetes.io/instance: mapmaker
  annotations:
    external-dns.alpha.kubernetes.io/target: ${vals_info_cluster_publicHost}
    # The SPA is built with base /mapmaker/, so every request the browser makes
    # already carries the prefix. Strip it here ($2 is the path after /mapmaker/)
    # before forwarding: web sees /, /assets/...; the server sees /create, /icons.
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # Map JSON can embed base64 custom images, so allow a generous POST body.
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "${vals_info_cluster_domain}"
  rules:
    - host: "${vals_info_cluster_domain}"
      http:
        paths:
          # API paths go to the Go renderer (most specific first).
          - path: "/mapmaker(/)(create.*)"
            pathType: ImplementationSpecific
            backend:
              service:
                name: mapmaker-server
                port:
                  name: http
          - path: "/mapmaker(/)(icons.*)"
            pathType: ImplementationSpecific
            backend:
              service:
                name: mapmaker-server
                port:
                  name: http
          # Everything else (index.html, /assets/...) is the static SPA.
          - path: "/mapmaker(/|$)(.*)"
            pathType: ImplementationSpecific
            backend:
              service:
                name: mapmaker-client
                port:
                  name: http
