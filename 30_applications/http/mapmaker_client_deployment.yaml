apiVersion: apps/v1
kind: Deployment
metadata:
  name: mapmaker-client
  namespace: http
  labels:
    app.kubernetes.io/instance: mapmaker
    app.kubernetes.io/name: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: client
      app.kubernetes.io/instance: mapmaker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: client
        app.kubernetes.io/instance: mapmaker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mapmaker-client
          # Unprivileged nginx serving the static SPA; listens on 8080 as non-root.
          image: ghcr.io/pixil98/mapmaker-client:0.0.2
          imagePullPolicy: IfNotPresent
          # nginx-unprivileged writes its pid and temp dirs under /tmp, so a
          # read-only rootfs needs a writable scratch volume mounted there.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
