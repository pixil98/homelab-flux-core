apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: roundcube-postgresql
  namespace: mail
spec:
  instances: 1

  # Light tuning for webmail workload
  postgresql:
    parameters:
      # Moderate autovacuum for session table churn
      autovacuum_naptime: "60s"
      autovacuum_vacuum_scale_factor: "0.1"

      # Basic performance tuning
      shared_buffers: "128MB"
      effective_cache_size: "2GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"

  superuserSecret:
    name: roundcube-postgresql-superuser

  bootstrap:
    initdb:
      database: roundcube
      owner: roundcube
      secret:
        name: roundcube-postgresql-appuser

  backup:
    barmanObjectStore:
      destinationPath: "s3://${vals_infra_storage_backup_s3Bucket}/${vals_info_cluster_name}/cnpg/roundcube-postgresql/"
      endpointURL: "${vals_infra_storage_backup_s3Endpoint}"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-credentials
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"

  storage:
    storageClass: truenas-iscsi
    size: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-backup-credentials
  namespace: mail
type: Opaque
stringData:
  ACCESS_KEY_ID: "${secrets_infra_storage_backup_awsAccessKeyId}"
  SECRET_ACCESS_KEY: "${secrets_infra_storage_backup_awsSecretAccessKey}"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: roundcube-postgresql-backup
  namespace: mail
spec:
  suspend: ${vals_infra_storage_backup_paused}
  schedule: "0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: roundcube-postgresql
---
apiVersion: v1
kind: Secret
metadata:
  name: roundcube-postgresql-appuser
  namespace: mail
type: kubernetes.io/basic-auth
stringData:
  username: roundcube
  password: ${secrets_apps_mail_roundcube_postgresql_app_password}
---
apiVersion: v1
kind: Secret
metadata:
  name: roundcube-postgresql-superuser
  namespace: mail
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: ${secrets_apps_mail_roundcube_postgresql_superuser_password}
