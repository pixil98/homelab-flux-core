apiVersion: v1
kind: Secret
metadata:
  name: volsync-dovecot-mailboxes
  namespace: mail
type: Opaque
stringData:
  RESTIC_REPOSITORY: "s3:${vals_infra_backup_s3_endpoint}/${vals_infra_backup_s3_bucket_volsync}/${vals_info_cluster_name}/mail/dovecot-mailboxes"
  RESTIC_PASSWORD: "${secrets_infra_backup_volsync_restic_password}"
  AWS_ACCESS_KEY_ID: "${secrets_infra_backup_s3_accessKey}"
  AWS_SECRET_ACCESS_KEY: "${secrets_infra_backup_s3_secretKey}"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dovecot-mailboxes
  namespace: mail
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: dovecot-mailboxes-restore
  namespace: mail
spec:
  trigger:
    manual: "${vals_cluster_restore_mode}"
  restic:
    repository: volsync-dovecot-mailboxes
    destinationPVC: dovecot-mailboxes
    copyMethod: Direct
