apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgresql
  namespace: photos
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-0.3.0

  # Tuned for vector workloads + bursty writes
  postgresql:
    parameters:
      shared_buffers: "256MB"
      effective_cache_size: "4GB"
      maintenance_work_mem: "128MB"
      work_mem: "32MB"
      autovacuum_vacuum_scale_factor: "0.1"
      checkpoint_completion_target: "0.9"

    shared_preload_libraries:
      - "vchord.so"

  superuserSecret:
    name: immich-postgresql-superuser

  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-postgresql-appuser
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS "vector";
        - CREATE EXTENSION IF NOT EXISTS "vchord" CASCADE;
        - CREATE EXTENSION IF NOT EXISTS "cube" CASCADE;
        - CREATE EXTENSION IF NOT EXISTS "earthdistance" CASCADE;
        # Tune session table
        - ALTER TABLE session SET (autovacuum_vacuum_scale_factor = 0.05);

  backup:
    barmanObjectStore:
      destinationPath: "s3://${vals_infra_storage_backup_s3Bucket}/${vals_info_cluster_name}/cnpg/immich-postgresql/"
      endpointURL: "${vals_infra_storage_backup_s3Endpoint}"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-credentials
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"

  storage:
    storageClass: truenas-iscsi
    size: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-backup-credentials
  namespace: photos
type: Opaque
stringData:
  ACCESS_KEY_ID: "${secrets_infra_storage_backup_awsAccessKeyId}"
  SECRET_ACCESS_KEY: "${secrets_infra_storage_backup_awsSecretAccessKey}"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: immich-postgresql-backup
  namespace: photos
spec:
  suspend: ${vals_infra_storage_backup_paused}
  schedule: "0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: immich-postgresql
---
apiVersion: v1
kind: Secret
metadata:
  name: immich-postgresql-appuser
  namespace: photos
type: kubernetes.io/basic-auth
stringData:
  username: immich
  password: ${secrets_apps_photos_immich_postgresql_app_password}
---
apiVersion: v1
kind: Secret
metadata:
  name: immich-postgresql-superuser
  namespace: photos
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: ${secrets_apps_photos_immich_postgresql_superuser_password}
