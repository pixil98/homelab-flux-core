apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-postgresql
  namespace: paperless
spec:
  instances: 1

  # Moderate autovacuum tuning for celery workloads
  postgresql:
    parameters:
      autovacuum_naptime: "45s"
      autovacuum_vacuum_scale_factor: "0.1"
      autovacuum_analyze_scale_factor: "0.05"

      # Performance
      shared_buffers: "192MB"
      effective_cache_size: "4GB"
      maintenance_work_mem: "96MB"
      checkpoint_completion_target: "0.9"

  superuserSecret:
    name: paperless-postgresql-superuser

  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-postgresql-appuser

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-backup

  storage:
    storageClass: truenas-iscsi
    size: 15Gi
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: cnpg-backup
  namespace: paperless
spec:
  configuration:
    destinationPath: "s3://${vals_info_cluster_name}/cnpg/"
    endpointURL: "${vals_infra_storage_backup_s3Endpoint}"
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-credentials
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backup-credentials
        key: SECRET_ACCESS_KEY
    wal:
      compression: gzip
  retentionPolicy: "30d"
---
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-backup-credentials
  namespace: paperless
type: Opaque
stringData:
  ACCESS_KEY_ID: "${secrets_infra_storage_backup_awsAccessKeyId}"
  SECRET_ACCESS_KEY: "${secrets_infra_storage_backup_awsSecretAccessKey}"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: paperless-postgresql-backup
  namespace: paperless
spec:
  suspend: ${vals_infra_storage_backup_paused}
  schedule: "0 3 * * *"
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  cluster:
    name: paperless-postgresql
---
apiVersion: v1
kind: Secret
metadata:
  name: paperless-postgresql-appuser
  namespace: paperless
type: kubernetes.io/basic-auth
stringData:
  username: paperless
  password: ${secrets_apps_paperless_paperless_postgresql_app_password}
---
apiVersion: v1
kind: Secret
metadata:
  name: paperless-postgresql-superuser
  namespace: paperless
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: ${secrets_apps_paperless_paperless_postgresql_superuser_password}
