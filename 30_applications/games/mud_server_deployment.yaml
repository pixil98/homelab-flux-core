apiVersion: apps/v1
kind: Deployment
metadata:
  name: mud-server
  namespace: games
  labels:
    app.kubernetes.io/instance: mud
    app.kubernetes.io/name: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: server
      app.kubernetes.io/instance: mud
  template:
    metadata:
      labels:
        app.kubernetes.io/name: server
        app.kubernetes.io/instance: mud
    spec:
      containers:
        - name: mud
          image: ghcr.io/pixil98/mud:v0.0.7
          imagePullPolicy: IfNotPresent
          command: ["/app/mud"]
          args: ["--config", "/app/config.json"]
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          ports:
            - name: telnet
              containerPort: 4000
              protocol: TCP
            - name: ssh
              containerPort: 4022
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: telnet
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: telnet
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: characters
              mountPath: /app/assets/characters
      volumes:
        - name: characters
          persistentVolumeClaim:
            claimName: mud-server-characters
