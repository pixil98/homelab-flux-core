apiVersion: apps/v1
kind: Deployment
metadata:
  name: mapper-server
  namespace: mapper
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/instance: mapper
    app.kubernetes.io/name: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: server
      app.kubernetes.io/instance: mapper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: server
        app.kubernetes.io/instance: mapper
    spec:
      initContainers:
        - name: prisma-migrate-deploy
          image: ghcr.io/bcnoexceptions/mapper-server:0.0.6
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              value: "file:/mapper/db/mapper.db"
          volumeMounts:
            - name: db
              mountPath: /mapper/db
      containers:
        - name: mapper-server
          image: ghcr.io/bcnoexceptions/mapper-server:0.0.6
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: "file:/mapper/db/mapper.db"
            - name: USE_SSL
              value: "false"
          envFrom:
            - secretRef:
                name: mapper-server-env
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: db
              mountPath: /mapper/db
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: mapper-server-db
