apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: envoy-gateway-mapper-tls
  namespace: ingress
spec:
  secretName: envoy-gateway-mapper-tls
  dnsNames:
    - "mapper.${secrets_apps_mapper_mapper_domain}"
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production-cloudflare
