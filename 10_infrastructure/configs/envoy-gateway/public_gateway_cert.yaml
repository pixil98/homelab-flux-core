apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: envoy-gateway-public-tls
  namespace: ingress
spec:
  secretName: envoy-gateway-public-tls
  dnsNames:
    - "${vals_info_cluster_domain}"
    - "*.${vals_info_cluster_domain}"
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-staging-cloudflare
