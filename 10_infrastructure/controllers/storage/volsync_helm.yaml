apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: storage
spec:
  releaseName: volsync
  chart:
    spec:
      chart: volsync
      sourceRef:
        kind: HelmRepository
        name: backube
      version: "0.11.0"
      interval: 6h
  interval: 30m
  install:
    remediation:
      retries: 3
  values:
    manageCRDs: true
