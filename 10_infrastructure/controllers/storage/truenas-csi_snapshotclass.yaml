apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: truenas-iscsi
driver: csi.truenas.io
deletionPolicy: Delete
parameters:
  pool: "ssd"
  datasetPath: "kubernetes/${vals_info_cluster_name}"
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: truenas-nfs
driver: csi.truenas.io
deletionPolicy: Delete
parameters:
  pool: "main"
  datasetPath: "kubernetes/${vals_info_cluster_name}"
