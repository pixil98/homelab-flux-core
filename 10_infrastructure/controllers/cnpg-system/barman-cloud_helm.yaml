apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: barman-cloud
  namespace: cnpg-system
spec:
  releaseName: barman-cloud
  chart:
    spec:
      chart: plugin-barman-cloud
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      version: "0.7.0"
      interval: 6h
  interval: 30m
  install:
    remediation:
      retries: 3
